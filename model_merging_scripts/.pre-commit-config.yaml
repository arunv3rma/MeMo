repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.9.2
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix, --fix-only ]
    # Run the formatter.
    - id: ruff-format
    # Format imports
    - id: ruff
      args: [ --select=I, --fix ]
      name: ruff-imports